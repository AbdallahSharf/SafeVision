# SafeVision CI/CD Pipeline
# Triggers on push to main OR manual "Run workflow" button click.
# Models are stored in GCS (not Git LFS) to avoid LFS quota issues.
#
# Required GitHub Secrets:
#   GCP_PROJECT_ID      - Google Cloud project ID
#   GCP_WIF_PROVIDER    - Workload Identity Provider resource name
#   GCP_SA_EMAIL        - Service account email
#   GCE_VM_NAME         - VM instance name
#   GCE_VM_ZONE         - VM zone (e.g. me-west1-a)
#   GCE_SSH_PRIVATE_KEY - SSH private key for the VM
#   GCS_MODELS_BUCKET   - GCS path (e.g. gs://safevision-models/models)
#   TAILSCALE_AUTHKEY   - Tailscale auth key (optional)

name: Deploy to Google Compute Engine

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: safevision
  REPO_NAME: safevision
  GCP_REGION: me-west1

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Sync model files to GCS
        run: |
          if [ -d "models" ] && [ "$(ls -A models/ 2>/dev/null)" ]; then
            echo "Syncing models to GCS..."
            gsutil -m rsync -r -c models/ ${{ secrets.GCS_MODELS_BUCKET }}/
            echo "Models synced."
          else
            echo "No local models dir - assuming already in GCS."
          fi

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Free up disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Build Docker image
        run: |
          FULL_IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}"
          docker build \
            --build-arg GCS_MODELS_BUCKET="${{ secrets.GCS_MODELS_BUCKET }}" \
            -t "${FULL_IMAGE}:${{ github.sha }}" \
            -t "${FULL_IMAGE}:latest" \
            .

      - name: Push Docker image
        run: |
          FULL_IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}"
          docker push "${FULL_IMAGE}:${{ github.sha }}"
          docker push "${FULL_IMAGE}:latest"

      - name: Get VM external IP
        id: get-ip
        run: |
          VM_IP=$(gcloud compute instances describe ${{ secrets.GCE_VM_NAME }} \
            --zone=${{ secrets.GCE_VM_ZONE }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --format='value(networkInterfaces[0].accessConfigs[0].natIP)')
          echo "vm_ip=${VM_IP}" >> $GITHUB_OUTPUT
          echo "VM IP: ${VM_IP}"

      - name: Deploy to Compute Engine via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.GCE_SSH_PRIVATE_KEY }}
          VM_IP: ${{ steps.get-ip.outputs.vm_ip }}
          FULL_IMAGE: "${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          GCP_REGION: ${{ env.GCP_REGION }}
          TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
        run: |
          echo "${SSH_PRIVATE_KEY}" > /tmp/gce_key
          chmod 600 /tmp/gce_key
          if [ -z "${VM_IP}" ]; then
            echo "ERROR: VM_IP is empty. Is the VM running?"
            exit 1
          fi
          ssh -o StrictHostKeyChecking=no -i /tmp/gce_key "Abdallah@${VM_IP}" <<EOF
            set -e
            gcloud auth configure-docker ${GCP_REGION}-docker.pkg.dev --quiet
            docker stop safevision 2>/dev/null || true
            docker rm safevision 2>/dev/null || true
            docker system prune -af
            docker pull "${FULL_IMAGE}"
            sudo mkdir -p /opt/safevision/unauthorized_faces
            sudo chmod 777 /opt/safevision/unauthorized_faces
            docker run -d \
              --name safevision \
              --restart unless-stopped \
              --network host \
              --gpus all \
              -v /opt/safevision/unauthorized_faces:/opt/safevision/unauthorized_faces \
              --env-file /opt/safevision/.env \
              "${FULL_IMAGE}"
            if [ -n "${TAILSCALE_AUTHKEY}" ]; then
              sudo tailscale up --authkey="${TAILSCALE_AUTHKEY}" --accept-routes --reset || true
            fi
          EOF
          rm /tmp/gce_key

      - name: Verify deployment
        env:
          VM_IP: ${{ steps.get-ip.outputs.vm_ip }}
        run: |
          echo "Deployed! Stream: http://${VM_IP}:8080/stream"
          echo "Waiting 90s for models to load..."
          sleep 90
          if curl --fail --silent --max-time 10 "http://${VM_IP}:8080/health"; then
            echo "Health check passed!"
          else
            echo "Health check pending - run: docker logs safevision"
          fi
