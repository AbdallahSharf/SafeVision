# =============================================================================
# SafeVision — CI/CD Pipeline
# =============================================================================
# Triggers on every push to main:
#   1. Builds Docker image
#   2. Pushes to Google Artifact Registry
#   3. SSHs into GCE VM to pull & restart the container
#
# Required GitHub Secrets (non-sensitive values are hardcoded as env vars below):
#   GCP_PROJECT_ID      — Google Cloud project ID (e.g. safevision-00)
#   GCP_WIF_PROVIDER    — Workload Identity Provider resource name
#   GCP_SA_EMAIL        — Service account email
#   GCE_VM_NAME         — VM name (e.g. safevision-vm)
#   GCE_VM_ZONE         — VM zone (e.g. me-west1-a)
#   GCE_SSH_PRIVATE_KEY — Private SSH key to connect to the VM
#
# NOTE: GCP_REGION is NOT a secret — it is hardcoded in env below.
# =============================================================================

name: Deploy to Google Compute Engine

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: safevision
  REPO_NAME: safevision
  # ── Non-sensitive config (hardcoded — change these if you switch region) ──
  GCP_REGION: me-west1

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    # Required for Workload Identity Federation (keyless auth — no JSON key)
    permissions:
      contents: read
      id-token: write

    steps:
      # ── 1. Checkout code ──────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true   # Pull Git LFS model files (.pt, .onnx)

      # ── 2. Authenticate with Google Cloud (Workload Identity Federation) ──
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # ── 3. Configure Docker to push to Artifact Registry ──────────────────
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      # ── 3.5 Free up disk space on runner ──────────────────────────────────
      - name: Free up disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      # ── 4. Build Docker image ─────────────────────────────────────────────
      - name: Build Docker image
        run: |
          FULL_IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}"
          docker build -t "${FULL_IMAGE}:${{ github.sha }}" -t "${FULL_IMAGE}:latest" .

      # ── 5. Push Docker image ──────────────────────────────────────────────
      - name: Push Docker image
        run: |
          FULL_IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}"
          docker push "${FULL_IMAGE}:${{ github.sha }}"
          docker push "${FULL_IMAGE}:latest"

      # ── 6. Get VM's external IP ───────────────────────────────────────────
      - name: Get VM external IP
        id: get-ip
        run: |
          VM_IP=$(gcloud compute instances describe ${{ secrets.GCE_VM_NAME }} \
            --zone=${{ secrets.GCE_VM_ZONE }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --format='value(networkInterfaces[0].accessConfigs[0].natIP)')
          echo "vm_ip=${VM_IP}" >> $GITHUB_OUTPUT
          echo "VM external IP: ${VM_IP}"

      # ── 7. SSH into VM and deploy ─────────────────────────────────────────
      - name: Deploy to Compute Engine via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.GCE_SSH_PRIVATE_KEY }}
          VM_IP: ${{ steps.get-ip.outputs.vm_ip }}
          FULL_IMAGE: "${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          GCP_REGION: ${{ env.GCP_REGION }}
          TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
        run: |
          # Write the SSH private key to a temp file
          echo "${SSH_PRIVATE_KEY}" > /tmp/gce_key
          chmod 600 /tmp/gce_key

          # SSH into the VM and run deployment commands
          ssh -o StrictHostKeyChecking=no -i /tmp/gce_key "Abdallah@${VM_IP}" << EOF
            set -e
            
            # Authenticate Docker to pull from Artifact Registry
            gcloud auth configure-docker ${GCP_REGION}-docker.pkg.dev --quiet

            # Pull the new image
            docker pull "${FULL_IMAGE}"

            # Stop and remove old container gracefully
            docker stop safevision 2>/dev/null || true
            docker rm safevision 2>/dev/null || true

            # Start the new container
            docker run -d \
              --name safevision \
              --restart unless-stopped \
              -p 8080:8080 \
              --gpus all \
              --env-file /opt/safevision/.env \
              "${FULL_IMAGE}"

            # Aggressively clean up all unused Docker images to save disk space
            docker system prune -af

            # Ensure Tailscale is authenticated and accepts subnet routes.
            # Uses a reusable pre-auth key so it reconnects automatically after VM reboots.
            if [ -n "${TAILSCALE_AUTHKEY}" ]; then
              sudo tailscale up --authkey="${TAILSCALE_AUTHKEY}" --accept-routes --reset || true
              echo "Tailscale: $(sudo tailscale status --json | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get(\"BackendState\", \"unknown\"))')"
            fi
          EOF

          # Clean up key file
          rm /tmp/gce_key

      # ── 8. Verify the deployment ──────────────────────────────────────────
      - name: Verify deployment
        env:
          VM_IP: ${{ steps.get-ip.outputs.vm_ip }}
        run: |
          echo "✅ Deployed! Endpoints:"
          echo "   Stream: http://${VM_IP}:8080/stream"
          echo "   Health: http://${VM_IP}:8080/health"
          echo "   Status: http://${VM_IP}:8080/status"

          # Give the app time to start up (models take ~90s to load on GPU)
          echo "Waiting 90 seconds for models to load..."
          sleep 90

          # Health check
          if curl --fail --silent --max-time 10 "http://${VM_IP}:8080/health"; then
            echo "✅ Health check passed!"
          else
            echo "⚠️ Health check pending — check: docker logs safevision"
          fi
